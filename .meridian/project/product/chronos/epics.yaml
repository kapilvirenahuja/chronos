slug: "chronos"
vision_path: ".meridian/project/product/chronos/vision.md"
time_horizon: "12 months"
generated_at: "2026-03-05"

epics:
  - id: "E1"
    name: "Intent Engine"
    strategic_goal: "Intent-Driven Knowledge Interaction"
    description: "Build the core intent detection and routing engine that classifies user input into one of five strategic intents (capture, retrieve, synthesize, decide, brief) and dispatches to specialized processing pipelines. This is the product's primary interaction model and the foundational infrastructure all other epics depend on."
    bucket: "near"
    priority: "P1"
    effort: "L"
    depends_on: []
    foundation_investment: true
    github_issue_ref: "TBD"
    intent:
      p1: "Today, knowledge workers who interact with AI systems must formulate explicit, precise queries to get useful results. There is no system that understands what a strategic leader is trying to accomplish — whether they want to capture a new decision, retrieve past reasoning, synthesize a pattern from accumulated signals, prepare for a decision, or produce a briefing artifact. Without intent classification, every interaction is a blank slate: the user must do the cognitive work of routing themselves, and the system has no persistent understanding of what type of help is being sought. This creates friction that disqualifies the tool for high-stakes, time-pressured contexts where strategic leaders actually operate."
      p2: "After this epic ships, a user can express their need in natural language — 'what did we decide about the database architecture?' or 'prepare a board briefing on our AI strategy' — and Chronos will correctly detect the intent category, route to the appropriate processing pipeline, and return a useful output without requiring the user to specify a command, choose a mode, or formulate a query. The system absorbs the routing complexity, and the user experiences a single fluid interface that always understands what they want. Interaction-to-value time drops below 15 seconds for retrieval and capture intents, and 80% of users report the system understood their need."
      p3: "Intent detection is the product's core architectural bet. Every other capability — compounding memory, multi-channel capture, persona-specific intelligence, traceability — depends on the system knowing what the user wants before it can route to the right pipeline. Without this layer, Chronos is indistinguishable from a generic AI assistant: powerful in isolation but unable to compound value across interactions. Building a production-grade intent engine in the near horizon is what makes every subsequent epic meaningful rather than additive features on top of a generic substrate. This epic makes Chronos a system, not a chatbot."
    constraints:
      in_scope: "Intent classification across five core intents: capture, retrieve, synthesize, decide, brief. Confidence scoring on each classification. Routing dispatch to processing pipeline stubs (pipelines are built in downstream epics). A feedback mechanism for low-confidence or misclassified intents. CLI as the primary interaction channel for this epic. Structured output contracts per intent type."
      out_of_scope: "The actual processing pipelines beyond routing stubs (those are built in E2, E3, E4, E5). Multi-channel input parsing beyond CLI (that is E4). Persona-specific intent variants (that is E5). Voice input. Any UI beyond CLI output."
      must_not_break: "None at this stage — foundational epic."
    success_scenarios:
      - "Given a CTO types 'why did we choose Postgres over MySQL last year?' in the CLI, when Chronos processes the input, then the intent is classified as 'retrieve' with confidence above 0.85 and the system dispatches to the retrieval pipeline stub returning a structured response within 15 seconds."
      - "Given a user inputs 'I just decided to sunset the mobile app by Q3', when Chronos processes the input, then the intent is classified as 'capture' and the system acknowledges capture completion with a confirmation containing the extracted decision context."
      - "Given a user submits an input that is genuinely ambiguous between 'synthesize' and 'retrieve', when Chronos processes the input with confidence below threshold, then the system surfaces a disambiguation prompt rather than routing silently to the wrong pipeline."
    failure_conditions:
      - "Intent detection accuracy falls below 80% in end-to-end testing across all five intent categories using a held-out test set of 50 diverse inputs from the three target personas."
      - "A user submits a capture, retrieve, or synthesize intent and waits more than 15 seconds before receiving any output or acknowledgment — even a loading indicator counts as output."
      - "The system silently routes to the wrong pipeline without surfacing a confidence warning, producing a response that addresses a different intent than what the user expressed."

  - id: "E2"
    name: "Traceability Layer"
    strategic_goal: "Trust Through Traceability"
    description: "Build the citation and confidence scoring infrastructure that attaches source references and reliability signals to every retrieval and synthesis output. Every output Chronos produces must be traceable to specific captured signals in the user's knowledge base, with explicit labeling when training knowledge is used instead."
    bucket: "near"
    priority: "P1"
    effort: "M"
    depends_on: ["E1"]
    foundation_investment: true
    github_issue_ref: "TBD"
    intent:
      p1: "Executives making high-stakes decisions face a fundamental trust barrier with AI systems: they cannot tell whether a response came from their own captured knowledge or from the model's training data. When a system surfaces a recommendation without a source, the user must either blindly trust it or spend time verifying it themselves — defeating the productivity value. Worse, hallucinated content presented without qualification can lead to decisions grounded in fabricated reasoning. Without a traceability layer, Chronos cannot differentiate itself from any generic LLM wrapper in the most important dimension for its target users: trustworthiness for consequential decisions."
      p2: "After this epic ships, every output Chronos produces will include source citations linking to the specific captured signals it drew on, with a confidence score reflecting how strongly the output is grounded in the user's own knowledge. When training knowledge is used, it will be explicitly labeled as such so users always know what is retrieved versus what is inferred. A user receiving a synthesis on their AI investment strategy will see exactly which captures from which dates were used as evidence. Over time, this transparency creates a trust flywheel: users who can verify sources become willing to rely on the system for progressively higher-stakes decisions."
      p3: "Traceability is designated as a continuous, non-negotiable goal in the product vision across the full 0–12 month horizon. It is not a nice-to-have — it is the mechanism by which Chronos earns the right to be used for consequential decisions. Shipping it in the near horizon alongside the intent engine ensures that from the first retrieval or synthesis, users experience a grounded, auditable system rather than a black box. This is what separates Chronos from Rewind AI (which records without reasoning) and from generic AI assistants (which generate without tracing). Traceability is also required for the compounding knowledge base in E3 to be trusted: users will not rely on synthesis outputs if they cannot see the sources."
    constraints:
      in_scope: "Source citation generation for retrieval and synthesis outputs — each output includes a list of source signal paths with capture dates. Confidence scoring on each output reflecting the proportion of content grounded in user captures versus training knowledge. Explicit labeling of training-knowledge-sourced content in all outputs. A citation format that is human-readable in CLI output and parseable for downstream rendering. Zero-hallucination guarantee for grounded outputs — any content not traceable to a capture must be labeled."
      out_of_scope: "UI for browsing citations (beyond CLI display). Audit log UI or dashboard for reviewing historical output provenance. Citation export or reporting features. Confidence score calibration tooling beyond initial implementation. Integration with external fact-checking systems."
      must_not_break: "E1 intent routing — traceability metadata must be added to output contracts without altering the routing behavior or increasing interaction-to-value time beyond the 15-second threshold."
    success_scenarios:
      - "Given a user asks Chronos to retrieve reasoning behind a past architecture decision and the vault contains relevant captures, when Chronos returns the response, then every factual claim in the response includes a source citation referencing a specific captured signal with its file path and capture date."
      - "Given a user asks a question for which Chronos has no relevant captured signals and must rely on training knowledge, when Chronos returns the response, then the response includes an explicit label — visible in CLI output — indicating that the content is training-knowledge-sourced and not grounded in the user's captures."
      - "Given a synthesis output is produced from a mix of captured signals and training knowledge, when the user reads the output, then each section or claim is attributable to either a specific capture or a labeled training-knowledge inference — no unmarked content exists in the output."
    failure_conditions:
      - "A retrieval or synthesis output is produced that contains factual claims traceable to user captures but includes no source citations — even a single uncited grounded claim is a failure."
      - "Training-knowledge-sourced content appears in any output without explicit labeling, indistinguishable from user-captured content."
      - "Adding traceability metadata to outputs causes interaction-to-value time to exceed the 15-second threshold established in E1 for retrieval and capture intents."

  - id: "E3"
    name: "Compounding Knowledge Base"
    strategic_goal: "Compounding Knowledge Base"
    description: "Build the two-layer memory architecture — short-term capture plus long-term curated signals — with automatic linking, quality gating, and proactive synthesis via heartbeat. This transforms Chronos from a session-scoped assistant into a personal knowledge system whose value compounds with every captured thought."
    bucket: "mid"
    priority: "P1"
    effort: "XL"
    depends_on: ["E1", "E2"]
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "The core failure mode of existing PKM tools is accumulation without compounding. Users add notes, decisions, and links — but the system never synthesizes patterns across time, never surfaces connections between a decision made six months ago and a question being asked today, and never proactively tells the user what they should revisit. Knowledge decays rather than compounds because the system treats every piece of content as equivalent and static. For strategic leaders who accumulate significant thinking over months and years, this means the most valuable asset — their past reasoning — becomes inaccessible noise rather than a leverageable resource."
      p2: "After this epic ships, Chronos maintains two distinct memory layers: a short-term layer that captures everything immediately with minimal latency, and a long-term layer that promotes only curated, high-signal content through quality gating. The proactive synthesis engine (heartbeat) runs periodically and surfaces novel connections, contradictions, and patterns across the user's knowledge base — delivering at least two valuable insights per week without the user having to ask. A user who captured a technology bet in month one will find it surfaced as relevant context when they make a related decision in month six. Retrieval queries return results spanning the full depth of captured knowledge, with 70%+ referencing signals older than 30 days."
      p3: "The compounding knowledge base is what makes Chronos defensible. Any competitor can add intent detection; no competitor can replicate six months of a specific user's captured strategic thinking. The two-layer memory with quality gating creates a flywheel: the more a user captures, the more valuable synthesis becomes; the more valuable synthesis becomes, the more the user captures. This epic is the engine of that flywheel. It also unlocks the role-specific intelligence in E5 — persona-tailored outputs require a rich knowledge base to draw on. Without E3, Chronos is a smart session assistant; with E3, it becomes a compounding strategic intelligence system."
    constraints:
      in_scope: "Short-term memory layer: immediate capture with full fidelity, session-scoped or time-bounded storage, no quality gating at ingest. Long-term memory layer: promotion pipeline from STM to LTM based on quality signals (recurrence, explicit user promotion, synthesis reference count). Automatic linking between related signals using semantic similarity. Quality gating rules: what constitutes a promotable signal. Heartbeat synthesis engine: scheduled (or on-demand) scans of LTM to surface connections, contradictions, and patterns. Heartbeat output format: structured insight cards with source citations (via E2 traceability layer). Knowledge base health metrics: curation ratio, depth of knowledge (signals older than 30 days), synthesis coverage."
      out_of_scope: "Multi-channel ingestion pipelines (that is E4). Persona-specific synthesis framing (that is E5). User-facing UI for browsing the knowledge graph. Bulk import tools for migrating from other PKM systems (deferred to onboarding phase). External knowledge integration (web content, documents not captured through Chronos channels). Knowledge base sharing or collaboration features."
      must_not_break: "E1 intent routing — retrieval intents must continue to dispatch correctly and must now route to the LTM layer for multi-session knowledge access. E2 traceability — all LTM-sourced content in synthesis outputs must continue to carry source citations and confidence scores."
    success_scenarios:
      - "Given a user has been capturing signals for 35 days and submits a retrieval query, when Chronos returns the results, then at least 70% of the cited source signals have capture dates more than 30 days prior, demonstrating the long-term value of the compounding base."
      - "Given a user has 50+ signals in LTM spanning multiple topics, when the heartbeat synthesis engine runs, then it surfaces at least 2 insight cards per week that the user rates as novel connections not previously visible to them, with each insight card citing at least 2 distinct source signals."
      - "Given a user captures a new decision signal, when quality gating evaluates it, then signals that recur across 3+ sessions or are explicitly promoted by the user within 7 days are present in LTM; signals that are one-off mentions without reinforcement are not promoted within the same window."
    failure_conditions:
      - "After 60 days of active use, 70% or more of retrieval query results reference only signals captured in the last 7 days — demonstrating that the long-term layer is not being populated or surfaced."
      - "The heartbeat engine runs for a full calendar month without surfacing a single insight that the user rates as novel — indicating the synthesis is producing generic summaries rather than genuine connections."
      - "The quality gating mechanism promotes every captured signal to LTM without discrimination, causing the long-term layer to become equivalent to the short-term layer and eliminating the curation benefit."
      - "LTM retrieval latency exceeds the 15-second threshold established in E1, indicating the knowledge base architecture does not scale to the expected signal volume."

  - id: "E4"
    name: "Multi-Channel Capture"
    strategic_goal: "Multi-Channel Strategic Capture"
    description: "Extend the capture pipeline beyond CLI to support chat platforms (Discord, Telegram, WhatsApp) and lay the architectural groundwork for voice and web capture. Strategic leaders think and communicate across multiple channels; Chronos must meet them where they are without degrading the quality of downstream synthesis."
    bucket: "mid"
    priority: "P2"
    effort: "L"
    depends_on: ["E1"]
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "The most valuable strategic thinking often happens in contexts where it is hardest to capture: a Slack thread with a co-founder, a voice note after a board meeting, a WhatsApp message during a commute. CLI-only capture constrains Chronos to deliberate, desktop-bound interactions — missing the spontaneous, high-signal moments that strategic leaders most need to preserve. Each uncaptured channel is a leak in the knowledge base: thinking that happens in that channel is permanently lost to the compounding system. Over time, a knowledge base built only from CLI inputs is structurally incomplete because it systematically misses an entire category of where strategic decisions are actually made."
      p2: "After this epic ships, a CTO can forward a WhatsApp thread about a technology bet decision to the Chronos bot and have it captured, classified, and stored with full fidelity. A founder can send a Telegram voice note after an investor call and have the key decisions extracted and routed to the appropriate intent pipeline. The system guarantees that capture-to-stored latency stays below 5 seconds across all supported channels, and that the quality of downstream synthesis from multi-channel captures is indistinguishable from CLI captures. Users who have adopted two or more channels report their knowledge base feels more complete — capturing the thinking that used to fall through the cracks."
      p3: "Multi-channel capture is what makes Chronos ambient rather than deliberate. The vision requires leaders to capture from wherever they think — not just from a terminal window. Shipping this in the mid horizon (after the intent engine and traceability layer are proven) ensures that when new channels are added, the quality bar is already set and the pipeline is hardened. This epic also directly addresses the cold start problem: users who can capture from chat and voice immediately have more paths to populate their knowledge base, accelerating the time-to-value that E3 depends on. Channel expansion is also a user acquisition story — each new channel integration is a distribution channel for new users."
    constraints:
      in_scope: "Chat platform integrations: Discord bot, Telegram bot, WhatsApp Business API integration. Channel-agnostic capture pipeline: a normalization layer that converts channel-specific input formats to the canonical signal format before routing to E1 intent engine. Capture-to-stored latency monitoring per channel — must stay below 5 seconds. Quality parity testing: automated comparison of synthesis output quality between CLI-captured and chat-captured signals on equivalent content. Groundwork for voice capture: audio input parsing and transcription pipeline (stub), to be fully activated in a follow-on epic. Groundwork for web capture: browser extension or bookmarklet stub, not full implementation."
      out_of_scope: "Voice capture full implementation beyond transcription stub (deferred post-mid horizon). Web capture full implementation (deferred). Any channel that requires native mobile app development. Cross-platform notification or response features — Chronos sends confirmations back through the channel but does not initiate conversations. Channel-specific personalization or formatting beyond the canonical signal normalization."
      must_not_break: "E1 intent routing — all channel inputs must pass through the intent engine unchanged after normalization; channel source must not alter intent classification. E3 compounding knowledge base — signals captured from new channels must be eligible for LTM promotion through the same quality gating rules as CLI captures."
    success_scenarios:
      - "Given a user forwards a chat message from a Discord server to the Chronos bot describing a technology decision, when Chronos processes the message, then the signal is captured, classified to the correct intent, stored in STM, and a confirmation is sent back to the Discord channel — all within 5 seconds."
      - "Given equivalent strategic content is captured once via CLI and once via Telegram, when both signals are used as sources in a synthesis query, then the output quality (as rated by a blind review) shows no measurable difference between the two source channels."
      - "Given a user has been using Chronos for 30 days, when their channel usage is reviewed, then they have captured from at least 2 distinct channels, demonstrating that multi-channel adoption is occurring rather than channel consolidation back to CLI."
    failure_conditions:
      - "Capture-to-stored latency exceeds 5 seconds on any supported channel under normal load, even for a single message — the sub-5-second guarantee is absolute, not a p95 target."
      - "A synthesis output downstream of a multi-channel capture produces lower quality results (factual gaps, missing context, incorrect intent classification) than an equivalent CLI capture — demonstrating that channel normalization is degrading signal quality."
      - "After 30 days of availability, fewer than 50% of active users have captured from a second channel, indicating the multi-channel value proposition is not translating to adoption."

  - id: "E5"
    name: "Role-Specific Intelligence"
    strategic_goal: "Role-Specific Strategic Intelligence"
    description: "Build the persona layer that tailors Chronos's intent handling, synthesis framing, and output formats to the specific decision context of each leadership role: CTOs receive technology-bet framing, PMs receive prioritization-pattern synthesis, Founders receive narrative-evolution tracking. Generic outputs are replaced with role-aware intelligence."
    bucket: "long"
    priority: "P2"
    effort: "L"
    depends_on: ["E1", "E3"]
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "The five core intents in E1 are role-agnostic: any user can capture, retrieve, synthesize, decide, or brief. But the shape of a useful output for each intent varies dramatically by role. A CTO asking for synthesis on their AI investments wants a technology-bet framing that connects decisions to architectural direction. A PM asking for the same synthesis wants a prioritization-pattern view that surfaces themes across customer signals. A Founder wants a narrative-evolution view that shows how their strategic thesis has shifted over time. Today, a generic system either produces one-size-fits-none outputs or forces users to specify role context on every query. Neither is acceptable for an AI system meant to be a trusted strategic partner."
      p2: "After this epic ships, a user who selects the CTO persona during onboarding will find that every Chronos interaction is shaped by their role context: retrieval outputs are framed as technology bets with architectural implications, synthesis outputs prioritize patterns in build-vs-buy decisions and team structure signals, and briefing outputs are formatted for board-level technology strategy communication. PM users receive a parallel experience: customer insight synthesis, prioritization rationale retrieval, and strategy review generation. Founders see investor narrative tracking, mental model evolution, and business model decision history. New users reach first meaningful value in under 10 minutes because onboarding populates persona-specific intent handlers immediately."
      p3: "Role-specific intelligence is Chronos's primary differentiation surface in the long horizon. It is what separates a general-purpose AI assistant — which any competitor can build — from a system that speaks the strategic language of a specific leadership role. By shipping this after E3 (compounding knowledge base), persona framing is grounded in a rich, curated knowledge base rather than a sparse session history. The combination of deep knowledge and role-specific synthesis is what enables Chronos to produce outputs that strategic leaders describe as 'this is exactly what I would have said, but faster and more complete.' This epic also directly unlocks the market expansion story: CTO-validated core architecture plus PM and Founder personas transforms a niche tool into a platform for strategic leaders broadly."
    constraints:
      in_scope: "Persona onboarding flow: user selects CTO, PM, or Founder persona during setup; onboarding populates at least 5 role-specific intent handlers per persona. Role-specific intent handlers: specialized processing variants for capture, retrieve, synthesize, decide, and brief intents — each producing role-framed outputs. CTO handlers: technology-bet framing, architectural-implication surfacing, build-vs-buy decision patterns. PM handlers: customer insight synthesis by theme, prioritization rationale retrieval, strategy review generation. Founder handlers: investor narrative tracking with version history, mental model evolution synthesis, business model decision audit. Relevance measurement: mechanism for collecting user ratings on role-matched versus generic outputs. Time-to-first-value measurement during onboarding."
      out_of_scope: "Custom persona creation by users (beyond the three defined roles). Enterprise team personas or multi-user role hierarchies. Role-specific UI theming or visual differentiation. Integration with external role-specific tools (e.g., Jira for PMs, cap table tools for Founders). Automated role detection from captured signals (user explicitly selects persona; auto-detection is a future enhancement)."
      must_not_break: "E1 intent routing — role-specific handlers must be additive variants within the existing routing architecture, not replacements that break generic intent dispatch for users without a persona selected. E2 traceability — all persona-framed outputs must continue to include source citations and confidence scores; role framing cannot suppress provenance. E3 knowledge base — persona handlers must read from the same LTM layer as generic handlers; they cannot create persona-siloed knowledge stores."
    success_scenarios:
      - "Given a CTO completes persona onboarding, when they submit a synthesize intent about their recent technology decisions, then the output is framed as a technology-bet analysis with architectural implications and build-vs-buy patterns — and the user rates the output as more relevant than a generic synthesis on the same data by at least 30%."
      - "Given a PM user submits a retrieval query about past prioritization decisions, when Chronos returns the response, then the output surfaces customer insight themes and prioritization rationale in a format the user can directly use in a planning meeting — not a raw list of captured signals."
      - "Given a new Founder user completes onboarding, when they interact with Chronos for the first time, then they reach a moment of demonstrable value — a retrieved or synthesized output that is directly useful to their work — within 10 minutes of starting onboarding."
    failure_conditions:
      - "After persona handlers are deployed, users in persona-matched experiences rate output relevance at the same level as generic mode — indicating the role framing is not producing meaningfully differentiated outputs."
      - "A persona-selected user submits a retrieval or synthesis intent and receives an output that makes no reference to their role context — the response is identical to what a user with no persona selected would receive."
      - "Adding persona handling to E1 routing causes intent detection accuracy to drop below 80% for any persona, indicating that role-specific routing variants are conflicting with the base intent classification model."
      - "New users with a persona selected take longer than 10 minutes to reach first demonstrable value during onboarding, indicating the persona onboarding flow is not delivering fast time-to-value."
