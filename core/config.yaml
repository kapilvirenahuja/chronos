# Chronos Configuration

project:
  name: Chronos
  type: Product

platform: github

github:
  repo: https://github.com/kapilvirenahuja/chronos.git

# Short-Term Memory (STM) — Issue-centric artifacts
stm:
  base-path: .meridian/project/issues/
  pending-path: .meridian/project/issues/_pending/
  archive-path: .meridian/project/issues/_archive/
  structure:
    spec: "{issue-number}/spec/"
    design: "{issue-number}/design/"
    evidence: "{issue-number}/evidence/{recipe-name}/{YYYYMMDD-HHMMSS}.md"
    delivery: "{issue-number}/delivery/"
    checkpoint: "{issue-number}/checkpoint/{recipe-name}/{YYYYMMDD-HHMMSS}.md"

# Product artifacts
product:
  base-path: .meridian/product/
